    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const submitbutton = document.getElementById('submit-button');
    
            submitbutton.addEventListener('click', function (event) {
                event.preventDefault();
                const name = document.getElementById('name').value;
                const gencomp = document.getElementById('gencomp').value;
                const location = document.getElementById('location').value;
                const company = document.getElementById('company').value;
                const packaging = document.getElementById('packaging').value;
                const price = document.getElementById('price').value;
                if (name === '' || gencomp === '' || location === '' || company === '' || packaging === '' || price === '') {
                    window.alert("Please fill out all fields.");
                    return;
                }
                    
                const confirmed1 = window.confirm("You are about to add a master to the database!");
                if (!confirmed1) {
                    window.location.reload();
                    return;
                }   
    
                let password = 'pass@123'; // Default password
                let authenticated = false;
                while (!authenticated) {
                    const userInput = prompt("Please enter the password:");
                    if (userInput === password) {
                        authenticated = true;
                        window.alert("Master Added!");
                        document.querySelector('.login-form').submit();
                    } else {
                        const retry = window.confirm("Wrong Password! Do you want to retry?");
                        if (!retry) {
                            window.location.reload();
                            return;
                        }
                    }
                }
            });
        });
    </script>
